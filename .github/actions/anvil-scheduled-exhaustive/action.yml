# Managed by cargo-anvil. Update the corresponding template in the cargo-anvil
# crate unless the change is repository-specific.
# Update behaviour: https://github.com/microsoft/ox-tools/blob/main/crates/cargo-anvil/docs/design/updates.md
# The token scheduled-exhaustive is substituted by cargo-anvil at emit time with
# the concrete check-group name (pr-fast, pr-test, scheduled-runtime-analysis, ...).
name: anvil-scheduled-exhaustive
description: Run the scheduled-exhaustive check group.
# The impact set reaches this action as the downloaded target/anvil/impact/
# cache. A PR group job downloads the `anvil-impact-<runner.os>` artifact into
# target/anvil/impact/ before this action runs, and the scoped checks read
# that cache via their `anvil-impact` dependency -- the same code path as a
# local run. Scheduled group jobs download nothing and run full-workspace
# (see the run step).
inputs:
  free-disk-space:
    description: Remove unused toolchains from GitHub-hosted runners before setup.
    default: "false"
    required: false
runs:
  using: composite
  steps:
    - uses: ./.github/actions/anvil-setup
      with:
        group: scheduled-exhaustive
        free-disk-space: ${{ inputs.free-disk-space }}
    - name: Run just anvil-scheduled-exhaustive
      shell: bash
      env:
        # Some checks (e.g. cargo-aprz, run only by groups that include it)
        # hit the GitHub API; pass the built-in token so they use the
        # authenticated quota (1000 vs 60 req/hr). Harmless for groups whose
        # checks never read it.
        GITHUB_TOKEN: ${{ github.token }}
      run: |
        set -euo pipefail
        # Scheduled tier always validates the FULL workspace: force off
        # (anvil-impact no-ops, every tier -> --workspace). Fixed by tier at
        # emit time, never probed at runtime, so no leftover state on the
        # runner can flip this job into impact scoping.
        export ANVIL_IMPACT=off
        just anvil-scheduled-exhaustive
