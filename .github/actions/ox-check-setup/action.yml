name: ox-check-setup
description: Install `just` and the catalog of cargo tools for ox-check check groups.
runs:
  using: composite
  steps:
    - id: rustc-version
      shell: bash
      run: echo "version=$(rustc --version | awk '{print $2}')" >> "$GITHUB_OUTPUT"
    - name: Cache cargo home and target
      uses: actions/cache@v4
      with:
        # Key on OS + arch + rustc version + lockfile hashes + catalog
        # hash so a Rust toolchain bump, a cross-arch matrix leg, or a
        # tool-minimums.txt update all invalidate the cache cleanly.
        # runner.arch resolves to X64 / ARM64 / X86, which keeps the
        # x86_64 and aarch64 legs of the same OS from colliding on
        # arch-incompatible target/ contents.
        key: ox-check-v1-${{ runner.os }}-${{ runner.arch }}-rust${{ steps.rustc-version.outputs.version }}-${{ hashFiles('Cargo.lock', '.cargo/config.toml', 'rust-toolchain.toml', 'justfiles/ox-check/tool-minimums.txt') }}
        restore-keys: |
          ox-check-v1-${{ runner.os }}-${{ runner.arch }}-rust${{ steps.rustc-version.outputs.version }}-
          ox-check-v1-${{ runner.os }}-${{ runner.arch }}-
        path: |
          ~/.cargo/registry/cache/
          ~/.cargo/registry/index/
          ~/.cargo/bin/
          target/

    # System dependencies for the catalog's source builds.
    #
    # cargo-spellcheck's build script (clang-sys) needs libclang. The
    # Ubuntu runner images don't ship it on PATH by default, so the
    # source compile fails with "couldn't execute llvm-config". On
    # macOS, libclang is bundled with Xcode CLT (always present on
    # GH-hosted macos-*). On Windows, the Visual Studio install on
    # the windows-* images includes a usable LLVM, so no install is
    # needed.
    - name: Install libclang (Linux)
      if: runner.os == 'Linux'
      shell: bash
      run: sudo apt-get update && sudo apt-get install -y libclang-dev

    # rustup auto-installs the toolchain from rust-toolchain.toml on
    # first cargo invocation, but it doesn't pull profile/component
    # extras (rustfmt, clippy). Without them, ox-check-fmt and
    # ox-check-clippy fail with "<tool> is not installed for the
    # toolchain". This step is unconditional because every OS leg
    # needs both components.
    - name: Ensure rustfmt + clippy components are installed
      shell: bash
      run: rustup component add rustfmt clippy

    - name: Install just
      shell: bash
      run: |
        if ! command -v just >/dev/null 2>&1 ; then
          cargo install --locked just
        fi
    - name: Install catalog tools
      shell: bash
      # ox-check-tools-install exits non-zero if any per-tool install
      # failed (e.g. cargo-mutants doesn't build on
      # aarch64-pc-windows-msvc due to an upstream winapi
      # incompatibility). We don't fail the whole job here — recipes
      # that actually USE a missing tool will fail cleanly via
      # _ox-check-require at recipe-run time. Recipes that don't
      # need it (e.g. clippy / fmt when cargo-mutants is missing)
      # proceed normally.
      continue-on-error: true
      run: just ox-check-tools-install
