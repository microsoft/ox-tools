name: ox-check-setup
description: Install `just` and the catalog of cargo tools for ox-check check groups.
runs:
  using: composite
  steps:
    - id: rustc-version
      shell: bash
      run: echo "version=$(rustc --version | awk '{print $2}')" >> "$GITHUB_OUTPUT"
    - name: Restore cargo cache
      id: cargo-cache
      uses: actions/cache/restore@v4
      with:
        # Key on OS + arch + rustc version + lockfile hashes + catalog
        # hash so a Rust toolchain bump, a cross-arch matrix leg, or a
        # tool-minimums.txt / rustup-components.txt update all invalidate
        # the cache cleanly. runner.arch resolves to X64 / ARM64 / X86,
        # which keeps the x86_64 and aarch64 legs of the same OS from
        # colliding on arch-incompatible target/ contents.
        #
        # ${{ github.job }} discriminates by workflow-job-id (`pr-fast`,
        # `pr-test`, `pr-slow`, etc.) so concurrent matrix legs that
        # share OS+arch (e.g. pr-fast linux + pr-test linux) don't race
        # on the same cache key. Without this, the first-to-finish job
        # reserves the key, the others get "Unable to reserve cache:
        # another job may be creating this cache" and silently skip
        # the save -- leaving the cache empty forever. The restore-keys
        # fall back across jobs so the install work is still shared
        # across sibling legs on subsequent runs.
        key: ox-check-v1-${{ runner.os }}-${{ runner.arch }}-rust${{ steps.rustc-version.outputs.version }}-${{ hashFiles('Cargo.lock', '.cargo/config.toml', 'rust-toolchain.toml', 'justfiles/ox-check/tool-minimums.txt', 'justfiles/ox-check/rustup-components.txt', 'justfiles/ox-check/versions.just') }}-${{ github.job }}
        restore-keys: |
          ox-check-v1-${{ runner.os }}-${{ runner.arch }}-rust${{ steps.rustc-version.outputs.version }}-${{ hashFiles('Cargo.lock', '.cargo/config.toml', 'rust-toolchain.toml', 'justfiles/ox-check/tool-minimums.txt', 'justfiles/ox-check/rustup-components.txt', 'justfiles/ox-check/versions.just') }}-
          ox-check-v1-${{ runner.os }}-${{ runner.arch }}-rust${{ steps.rustc-version.outputs.version }}-
          ox-check-v1-${{ runner.os }}-${{ runner.arch }}-
        # `.crates.toml` and `.crates2.json` track which cargo-installed
        # tools and versions live in ~/.cargo/bin/. Without them in the
        # cache, `cargo install --list` and (downstream) the
        # `_ox-check-require` early-skip check don't see the cached
        # binaries — every run then tries to reinstall on top of them
        # and fails with "binary X already exists in destination".
        path: |
          ~/.cargo/registry/cache/
          ~/.cargo/registry/index/
          ~/.cargo/bin/
          ~/.cargo/.crates.toml
          ~/.cargo/.crates2.json
          target/

    # System dependencies for the catalog's source builds.
    #
    # cargo-spellcheck's build script (clang-sys) needs libclang. The
    # Ubuntu runner images don't ship it on PATH by default, so the
    # source compile fails with "couldn't execute llvm-config". On
    # macOS, libclang is bundled with Xcode CLT (always present on
    # GH-hosted macos-*). On Windows, the Visual Studio install on
    # the windows-* images includes a usable LLVM, so no install is
    # needed.
    - name: Install libclang (Linux)
      if: runner.os == 'Linux'
      shell: bash
      run: sudo apt-get update && sudo apt-get install -y libclang-dev

    # rustup auto-installs the toolchain from rust-toolchain.toml on
    # first cargo invocation, but it doesn't pull profile/component
    # extras. The `ox-check-setup` recipe in step "Install ox-check
    # toolchains + tools" below handles that exhaustively (reading
    # `rustup-components.txt` for default-toolchain components and
    # the pinned-nightly components for miri/careful/etc.) -- we
    # don't add components inline here anymore. This step exists
    # only to ensure rustup itself has the default toolchain set up
    # so subsequent cargo / just calls work.
    - name: Ensure default toolchain is installed
      shell: bash
      run: rustup show active-toolchain || rustup default stable

    # The catalog recipe `ox-check-setup` needs `just` to run. We
    # bootstrap just here (chicken-and-egg), then hand off everything
    # else to `just ox-check-setup binstall`. The recipe is
    # idempotent and handles its own caching via `_ox-check-require`,
    # so re-running it on cache-hit runs is cheap.
    - name: Install just
      shell: bash
      run: |
        if ! command -v just >/dev/null 2>&1 ; then
          cargo install --locked just
        fi

    - name: Install ox-check toolchains + tools
      shell: bash
      # Idempotent. binstall path downloads prebuilt tool binaries
      # from each tool's GitHub Releases when available (~1 min cold,
      # vs ~30 min for source builds). cargo-binstall has unresolved
      # compliance issues for ADO pipelines, so the ADO backend uses
      # the default `install` path; GH uses `binstall`.
      #
      # ox-check-setup exits non-zero if any per-tool install failed
      # (e.g. cargo-mutants doesn't build on aarch64-pc-windows-msvc
      # due to an upstream winapi incompatibility). We don't fail
      # the whole job here -- recipes that actually USE a missing
      # tool will fail cleanly via _ox-check-require at recipe-run
      # time. Recipes that don't need it (e.g. clippy / fmt when
      # cargo-mutants is missing) proceed normally.
      continue-on-error: true
      run: just ox-check-setup binstall

    # Save the cache as the LAST step of setup, regardless of whether
    # any earlier install step partially failed. `actions/cache@v4`
    # used to support this via `save-always: true`, but that knob is
    # deprecated as of 2025 with the explicit message "does not work
    # as intended" — failing runs simply don't save. The supported
    # replacement is to call `actions/cache/save@v4` directly as its
    # own step with `if: always()`.
    #
    # Without this, a single catalog issue that fails the install
    # step locks the cache empty forever (chicken-and-egg: failed
    # run -> no save -> next run cold-starts -> still fails -> still
    # no save). Tool binaries installed by ox-check-tools-install are
    # immutable once on disk, so partial state is strictly better
    # than nothing — and subsequent runs accumulate into the cache
    # until the catalog is complete.
    - name: Save cargo cache
      if: always() && steps.cargo-cache.outputs.cache-hit != 'true'
      uses: actions/cache/save@v4
      with:
        key: ${{ steps.cargo-cache.outputs.cache-primary-key }}
        path: |
          ~/.cargo/registry/cache/
          ~/.cargo/registry/index/
          ~/.cargo/bin/
          ~/.cargo/.crates.toml
          ~/.cargo/.crates2.json
          target/
          target/
