# Owned by cargo-ox-check; edit via `cargo ox-check update`.
# The token pr-slow3 is substituted by cargo-ox-check at emit time with
# the concrete check-group name (pr-fast, pr-test, scheduled-runtime, ...).
name: ox-check-pr-slow3
description: Run the pr-slow3 check group.
inputs:
  include_modified:
    description: |
      Pre-formatted --package args (e.g. "--package alpha --package beta")
      for the modified tier, or the sentinel "--skip" when nothing
      modified. Local invocations leave it unset; recipes default to
      --workspace.
    default: ""
    required: false
  include_affected:
    description: |
      Same shape as include_modified, but for the affected tier
      (modified ∪ rev-deps).
    default: ""
    required: false
  include_required:
    description: |
      Same shape as include_modified, but for the required tier
      (affected ∪ workspace-internal transitive deps).
    default: ""
    required: false
runs:
  using: composite
  steps:
    - uses: ./.github/actions/ox-check-setup
    - name: Run just ox-check-pr-slow3
      shell: bash
      env:
        OX_CHECK_INCLUDE_MODIFIED: ${{ inputs.include_modified }}
        OX_CHECK_INCLUDE_AFFECTED: ${{ inputs.include_affected }}
        OX_CHECK_INCLUDE_REQUIRED: ${{ inputs.include_required }}
        # cargo-aprz hits the GitHub API (unauthenticated = 60 req/hr); pass the
        # built-in token so it can use the 1000 req/hr authenticated quota.
        GITHUB_TOKEN: ${{ github.token }}
      run: just ox-check-pr-slow3
