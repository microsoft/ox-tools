name: ox-check-nightly-impl

on:
  workflow_call:
    inputs:
      linux_runner:
        description: Runner label for x86_64 Linux jobs.
        type: string
        default: ubuntu-latest
      windows_runner:
        description: Runner label for x86_64 Windows jobs.
        type: string
        default: windows-latest
      linux_arm_runner:
        description: Runner label for aarch64 Linux jobs.
        type: string
        default: ubuntu-24.04-arm
      windows_arm_runner:
        description: Runner label for aarch64 Windows jobs.
        type: string
        default: windows-11-arm
    secrets:
      CODECOV_TOKEN:
        description: |
          Codecov upload token. Optional for public repos that have OIDC
          configured at Codecov; required for private repos.
        required: false

# Note on matrices: see pr-impl-workflow.yml for the rationale. OS
# matrices are hardcoded; per-leg runner labels are inputs.

jobs:
  nightly-test:
    strategy:
      fail-fast: false
      matrix:
        os: [linux, windows, linux-arm, windows-arm]
    runs-on: ${{ matrix.os == 'linux' && inputs.linux_runner
      || matrix.os == 'windows' && inputs.windows_runner
      || matrix.os == 'linux-arm' && inputs.linux_arm_runner
      || inputs.windows_arm_runner }}
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/ox-check-nightly-test
      - name: Upload coverage to Codecov
        # Single canonical leg uploads coverage; matches the pr-test
        # logic. oxidizer-github also excludes windows-11-arm from
        # coverage due to LLVM-coverage instrumentation bugs.
        if: matrix.os == 'linux'
        uses: codecov/codecov-action@v5
        with:
          files: target/coverage/lcov.info
          token: ${{ secrets.CODECOV_TOKEN }}
          flags: nightly
          fail_ci_if_error: false

  nightly-advisories:
    # Cross-OS / cross-arch because clippy and udeps in this group
    # compile per host, so cfg-gated code must be linted/scanned on
    # every leg.
    strategy:
      fail-fast: false
      matrix:
        os: [linux, windows, linux-arm, windows-arm]
    runs-on: ${{ matrix.os == 'linux' && inputs.linux_runner
      || matrix.os == 'windows' && inputs.windows_runner
      || matrix.os == 'linux-arm' && inputs.linux_arm_runner
      || inputs.windows_arm_runner }}
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/ox-check-nightly-advisories

  nightly-runtime:
    # Cross-OS / cross-arch to match the surveyed repos: oxidizer runs
    # miri on every platform in its matrix; oxidizer-github runs miri
    # + careful across four legs.
    strategy:
      fail-fast: false
      matrix:
        os: [linux, windows, linux-arm, windows-arm]
    runs-on: ${{ matrix.os == 'linux' && inputs.linux_runner
      || matrix.os == 'windows' && inputs.windows_runner
      || matrix.os == 'linux-arm' && inputs.linux_arm_runner
      || inputs.windows_arm_runner }}
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/ox-check-nightly-runtime

  nightly-exhaustive:
    # x86_64-only by design: this group includes mutants-full (which
    # doesn't build on aarch64-pc-windows-msvc — winapi crate
    # incompatibility) plus cargo-hack feature powerset and bench.
    strategy:
      fail-fast: false
      matrix:
        os: [linux, windows]
    runs-on: ${{ matrix.os == 'linux' && inputs.linux_runner || inputs.windows_runner }}
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/ox-check-nightly-exhaustive
