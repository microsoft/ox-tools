name: ox-check-pr-impl

on:
  workflow_call:
    inputs:
      linux_runner:
        description: Runner label for x86_64 Linux jobs.
        type: string
        default: ubuntu-latest
      windows_runner:
        description: Runner label for x86_64 Windows jobs.
        type: string
        default: windows-latest
      linux_arm_runner:
        description: Runner label for aarch64 Linux jobs.
        type: string
        default: ubuntu-24.04-arm
      windows_arm_runner:
        description: Runner label for aarch64 Windows jobs.
        type: string
        default: windows-11-arm
    secrets:
      CODECOV_TOKEN:
        description: |
          Codecov upload token. Optional for public repos that have OIDC
          configured at Codecov; required for private repos.
        required: false

# Note on matrices: every multi-OS job below hardcodes its OS axis as
# an inline YAML array. Per-leg runner *labels* are inputs (so adopters
# can swap in self-hosted runners), but the OS axis itself is part of
# the workflow's identity — adopters who need a different shape (add
# macOS, drop ARM, mix in exotic targets) fork this file. Input-driven
# matrices were rejected because they added a silent failure mode
# (mis-formatted inputs produced empty matrices) without meaningfully
# expanding what adopters could customize.

jobs:
  impact:
    runs-on: ${{ inputs.linux_runner }}
    outputs:
      include_modified: ${{ steps.delta.outputs.include_modified }}
      include_affected: ${{ steps.delta.outputs.include_affected }}
      include_required: ${{ steps.delta.outputs.include_required }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - id: delta
        uses: ./.github/actions/ox-check-impact

  pr-fast:
    # Cross-OS / cross-arch because pr-fast contains compile-sensitive
    # checks (clippy, doc-build, udeps, semver-check, external-types)
    # whose results can differ across host for crates that use
    # #[cfg(target_os = ...)] or #[cfg(target_arch = ...)] gating.
    needs: impact
    strategy:
      fail-fast: false
      matrix:
        os: [linux, windows, linux-arm, windows-arm]
    runs-on: ${{ matrix.os == 'linux' && inputs.linux_runner
      || matrix.os == 'windows' && inputs.windows_runner
      || matrix.os == 'linux-arm' && inputs.linux_arm_runner
      || inputs.windows_arm_runner }}
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/ox-check-pr-fast
        with:
          include_modified: ${{ needs.impact.outputs.include_modified }}
          include_affected: ${{ needs.impact.outputs.include_affected }}
          include_required: ${{ needs.impact.outputs.include_required }}
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}

  pr-test:
    needs: impact
    strategy:
      fail-fast: false
      matrix:
        os: [linux, windows, linux-arm, windows-arm]
    runs-on: ${{ matrix.os == 'linux' && inputs.linux_runner
      || matrix.os == 'windows' && inputs.windows_runner
      || matrix.os == 'linux-arm' && inputs.linux_arm_runner
      || inputs.windows_arm_runner }}
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/ox-check-pr-test
        with:
          include_modified: ${{ needs.impact.outputs.include_modified }}
          include_affected: ${{ needs.impact.outputs.include_affected }}
          include_required: ${{ needs.impact.outputs.include_required }}
      - name: Upload coverage to Codecov
        # Upload from one leg only to avoid double-counting; pick the
        # canonical x86_64 Linux leg. oxidizer-github also excludes
        # windows-11-arm from coverage due to LLVM-coverage
        # instrumentation bugs.
        if: matrix.os == 'linux' && needs.impact.outputs.include_affected != '--skip'
        uses: codecov/codecov-action@v5
        with:
          files: target/coverage/lcov.info
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false

  pr-mutants:
    # x86_64-only by design: cargo-mutants currently doesn't build on
    # aarch64-pc-windows-msvc (upstream winapi crate incompat), and
    # mutation testing on the cross-arch legs adds wall-clock without
    # commensurate coverage benefit.
    needs: impact
    strategy:
      fail-fast: false
      matrix:
        os: [linux, windows]
    runs-on: ${{ matrix.os == 'linux' && inputs.linux_runner || inputs.windows_runner }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: ./.github/actions/ox-check-pr-mutants
        with:
          include_modified: ${{ needs.impact.outputs.include_modified }}
          include_affected: ${{ needs.impact.outputs.include_affected }}
          include_required: ${{ needs.impact.outputs.include_required }}
        env:
          BASE_REF: ${{ github.event.pull_request.base.sha }}
