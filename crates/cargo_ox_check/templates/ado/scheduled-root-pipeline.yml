trigger: none
pr: none

schedules:
  - cron: "0 6 * * *"
    displayName: ox-check scheduled
    branches:
      include: [main, master]
    always: true

stages:
  - template: ox-check/scheduled.yml
    parameters:
      linuxPool: { vmImage: ubuntu-latest }
      windowsPool: { vmImage: windows-latest }
