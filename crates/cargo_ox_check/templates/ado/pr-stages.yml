# Owned by cargo-ox-check; edit via `cargo ox-check update`.
#
# Every job in this stages template is rendered through `steps/job.yml`.
# That wrapper is *user-customizable*: adopters who need to inject 1ESPT
# `templateContext:` blocks, custom SDL knobs, build-provenance attrs, etc.
# edit `steps/job.yml` once and ox-check stops overwriting it. This stages
# template stays owned and continues to track new groups, dependsOn rewires,
# impact-output threading changes, etc.
#
# Template-path note: each entry in the `steps:` parameter below contains a
# `template:` reference. ADO resolves template paths relative to the file
# containing the `template:` keyword, which (for parameters defined at the
# call site) is *this* file. So paths like `steps/pr-fast.yml` are correct.
parameters:
  - name: linuxPool
    type: object
    default: { vmImage: ubuntu-latest }
  - name: windowsPool
    type: object
    default: { vmImage: windows-latest }

stages:
  - stage: impact
    displayName: ox-check impact
    jobs:
      - template: steps/job.yml
        parameters:
          name: compute
          pool: ${{ parameters.linuxPool }}
          steps:
            - template: steps/impact.yml

  - stage: pr_fast
    displayName: ox-check pr-fast
    dependsOn: impact
    condition: succeededOrFailed()
    variables:
      include_modified: $[ stageDependencies.impact.compute.outputs['compute.include_modified'] ]
      include_affected: $[ stageDependencies.impact.compute.outputs['compute.include_affected'] ]
      include_required: $[ stageDependencies.impact.compute.outputs['compute.include_required'] ]
    jobs:
      # Cross-OS because pr-fast contains compile-sensitive checks
      # (clippy, doc-build, udeps, semver-check, external-types) whose
      # results can differ across host OS for crates that use
      # #[cfg(target_os = ...)] gating.
      - template: steps/job.yml
        parameters:
          name: linux
          pool: ${{ parameters.linuxPool }}
          steps:
            - template: steps/pr-fast.yml
              parameters:
                include_modified: $(include_modified)
                include_affected: $(include_affected)
                include_required: $(include_required)
      - template: steps/job.yml
        parameters:
          name: windows
          pool: ${{ parameters.windowsPool }}
          steps:
            - template: steps/pr-fast.yml
              parameters:
                include_modified: $(include_modified)
                include_affected: $(include_affected)
                include_required: $(include_required)

  - stage: pr_test
    displayName: ox-check pr-test
    dependsOn: impact
    condition: succeededOrFailed()
    variables:
      include_modified: $[ stageDependencies.impact.compute.outputs['compute.include_modified'] ]
      include_affected: $[ stageDependencies.impact.compute.outputs['compute.include_affected'] ]
      include_required: $[ stageDependencies.impact.compute.outputs['compute.include_required'] ]
    jobs:
      - template: steps/job.yml
        parameters:
          name: linux
          pool: ${{ parameters.linuxPool }}
          steps:
            - template: steps/pr-test.yml
              parameters:
                include_modified: $(include_modified)
                include_affected: $(include_affected)
                include_required: $(include_required)
            # Coverage publish stays as a sibling task — it's a results
            # publish (not a pipeline artifact), so 1ESPT permits it at
            # step level and we don't need to route it through `artifacts:`.
            - task: PublishCodeCoverageResults@2
              condition: and(succeededOrFailed(), ne(variables.include_affected, '--skip'))
              displayName: Publish coverage
              inputs:
                summaryFileLocation: target/coverage/cobertura.xml
                failIfCoverageEmpty: false
      - template: steps/job.yml
        parameters:
          name: windows
          pool: ${{ parameters.windowsPool }}
          steps:
            - template: steps/pr-test.yml
              parameters:
                include_modified: $(include_modified)
                include_affected: $(include_affected)
                include_required: $(include_required)

  - stage: pr_mutants
    displayName: ox-check pr-mutants
    dependsOn: impact
    condition: succeededOrFailed()
    variables:
      include_modified: $[ stageDependencies.impact.compute.outputs['compute.include_modified'] ]
      include_affected: $[ stageDependencies.impact.compute.outputs['compute.include_affected'] ]
      include_required: $[ stageDependencies.impact.compute.outputs['compute.include_required'] ]
    jobs:
      # Cross-OS to match oxidizer's policy: mutation testing on
      # cfg(target_os) gated code matters. Diff-scoped (--in-diff) keeps
      # each leg's runtime bounded.
      - template: steps/job.yml
        parameters:
          name: linux
          pool: ${{ parameters.linuxPool }}
          steps:
            - template: steps/pr-mutants.yml
              parameters:
                include_modified: $(include_modified)
                include_affected: $(include_affected)
                include_required: $(include_required)
      - template: steps/job.yml
        parameters:
          name: windows
          pool: ${{ parameters.windowsPool }}
          steps:
            - template: steps/pr-mutants.yml
              parameters:
                include_modified: $(include_modified)
                include_affected: $(include_affected)
                include_required: $(include_required)
