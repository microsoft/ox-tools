# Owned by cargo-ox-check; edit via `cargo ox-check update`.
# The token __GROUP__ is substituted by cargo-ox-check at emit time with
# the concrete check-group name (pr-fast, pr-test, nightly-runtime, ...).
parameters:
  - name: include_modified
    type: string
    default: ''
  - name: include_affected
    type: string
    default: ''
  - name: include_required
    type: string
    default: ''
steps:
  - template: setup.yml
  - bash: just ox-check-__GROUP__
    displayName: ox-check-__GROUP__
    env:
      OX_CHECK_INCLUDE_MODIFIED: ${{ parameters.include_modified }}
      OX_CHECK_INCLUDE_AFFECTED: ${{ parameters.include_affected }}
      OX_CHECK_INCLUDE_REQUIRED: ${{ parameters.include_required }}
