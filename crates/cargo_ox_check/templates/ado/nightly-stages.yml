#
# Every job is rendered through `steps/job.yml` (user-customizable wrapper);
# see pr-stages.yml for the rationale and template-path note.
parameters:
  - name: linuxPool
    type: object
    default: { vmImage: ubuntu-latest }
  - name: windowsPool
    type: object
    default: { vmImage: windows-latest }

stages:
  - stage: nightly_test
    displayName: ox-check nightly-test
    jobs:
      - template: steps/job.yml
        parameters:
          name: linux
          pool: ${{ parameters.linuxPool }}
          steps:
            - template: steps/nightly-test.yml
            - task: PublishCodeCoverageResults@2
              condition: succeededOrFailed()
              displayName: Publish coverage
              inputs:
                summaryFileLocation: target/coverage/cobertura.xml
                failIfCoverageEmpty: false
      - template: steps/job.yml
        parameters:
          name: windows
          pool: ${{ parameters.windowsPool }}
          steps:
            - template: steps/nightly-test.yml

  - stage: nightly_advisories
    displayName: ox-check nightly-advisories
    dependsOn: []
    jobs:
      # Cross-OS because clippy and udeps in this group compile per host,
      # so cfg-gated code must be linted/scanned on both OSes.
      - template: steps/job.yml
        parameters:
          name: linux
          pool: ${{ parameters.linuxPool }}
          steps:
            - template: steps/nightly-advisories.yml
      - template: steps/job.yml
        parameters:
          name: windows
          pool: ${{ parameters.windowsPool }}
          steps:
            - template: steps/nightly-advisories.yml

  - stage: nightly_runtime
    displayName: ox-check nightly-runtime
    dependsOn: []
    jobs:
      # Cross-OS to match the surveyed repos: oxidizer runs miri on
      # every platform in its matrix (Windows_x64 + Linux_x64);
      # oxidizer-github runs miri + careful across Linux/Windows.
      # Both tools work on every Tier 1 Rust target.
      #
      # ADO has no Microsoft-hosted ARM agents (unlike GH), so the
      # default ARM coverage that the GitHub backend ships is not
      # available here. Adopters with self-hosted ARM pools extend
      # this stage in their root pipeline.
      - template: steps/job.yml
        parameters:
          name: linux
          pool: ${{ parameters.linuxPool }}
          steps:
            - template: steps/nightly-runtime.yml
      - template: steps/job.yml
        parameters:
          name: windows
          pool: ${{ parameters.windowsPool }}
          steps:
            - template: steps/nightly-runtime.yml

  - stage: nightly_exhaustive
    displayName: ox-check nightly-exhaustive
    dependsOn: []
    jobs:
      # Cross-OS to match oxidizer's policy: full-workspace mutation
      # testing + cargo-hack powerset + bench compile checks all benefit
      # from running on both OSes for cfg(target_os) coverage. Adopters
      # who can't afford the Windows leg override the matrix in their
      # root pipeline.
      - template: steps/job.yml
        parameters:
          name: linux
          pool: ${{ parameters.linuxPool }}
          steps:
            - template: steps/nightly-exhaustive.yml
      - template: steps/job.yml
        parameters:
          name: windows
          pool: ${{ parameters.windowsPool }}
          steps:
            - template: steps/nightly-exhaustive.yml
