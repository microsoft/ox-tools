# Owned by cargo-ox-check; edit via `cargo ox-check update`.
# The token __DEFAULT_BRANCH__ is substituted by cargo-ox-check at emit
# time with the repo's default branch.
trigger: none
pr: none

schedules:
  - cron: "0 6 * * *"
    displayName: ox-check nightly
    branches:
      include: [__DEFAULT_BRANCH__]
    always: true

stages:
  - template: ox-check/nightly.yml
    parameters:
      linuxPool: { vmImage: ubuntu-latest }
      windowsPool: { vmImage: windows-latest }
