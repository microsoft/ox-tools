name: ox-check-setup
description: Install `just` and the catalog of cargo tools for ox-check check groups.
runs:
  using: composite
  steps:
    - id: rustc-version
      shell: bash
      run: echo "version=$(rustc --version | awk '{print $2}')" >> "$GITHUB_OUTPUT"
    - name: Cache cargo home and target
      uses: actions/cache@v4
      with:
        # Key on OS + rustc version + lockfile hashes + catalog hash so
        # a Rust toolchain bump or a tool-minimums.txt update both
        # invalidate the cache cleanly.
        key: ox-check-v1-${{ runner.os }}-rust${{ steps.rustc-version.outputs.version }}-${{ hashFiles('Cargo.lock', '.cargo/config.toml', 'rust-toolchain.toml', 'justfiles/ox-check/tool-minimums.txt') }}
        restore-keys: |
          ox-check-v1-${{ runner.os }}-rust${{ steps.rustc-version.outputs.version }}-
          ox-check-v1-${{ runner.os }}-
        path: |
          ~/.cargo/registry/cache/
          ~/.cargo/registry/index/
          ~/.cargo/bin/
          target/
    - name: Install just
      shell: bash
      run: |
        if ! command -v just >/dev/null 2>&1 ; then
          cargo install --locked just
        fi
    - name: Install catalog tools
      shell: bash
      run: just ox-check-tools-install
