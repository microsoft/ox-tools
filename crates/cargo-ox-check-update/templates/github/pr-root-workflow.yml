name: ox-check-pr

on:
  pull_request: {}
  merge_group: {}

permissions:
  contents: read

concurrency:
  group: ox-check-pr-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  ox-check-pr:
    uses: ./.github/workflows/ox-check-pr-impl.yml
    permissions:
      contents: read
      # Write needed so the pr-fast job can upsert/clear the sticky PR
      # comment carrying the cargo-semver-checks advisory (and any
      # future advisory checks that emit target/ox-check/comments/*).
      pull-requests: write
    secrets: inherit
