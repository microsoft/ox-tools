# Owned by cargo-ox-check-update; edit via `cargo ox-check-update`.
# The token __GROUP__ is substituted by cargo-ox-check-update at emit time with
# the concrete check-group name (pr-fast, pr-test, scheduled-runtime, ...).
parameters:
  - name: include_modified
    type: string
    default: ''
  - name: include_affected
    type: string
    default: ''
  - name: include_required
    type: string
    default: ''
steps:
  - template: setup.yml
    parameters:
      group: __GROUP__
  - bash: just ox-check-__GROUP__
    displayName: ox-check-__GROUP__
    env:
      # Only ox-check-pr-title (in the pr-fast group) consults PR_TITLE,
      # but injecting it on every group keeps group.yml uniform across
      # groups. ADO sets $(System.PullRequest.Title) to an empty string
      # on non-PR builds; ox-check-pr-title treats empty as "no title set"
      # and skips.
      PR_TITLE: $(System.PullRequest.Title)
      OX_CHECK_INCLUDE_MODIFIED: ${{ parameters.include_modified }}
      OX_CHECK_INCLUDE_AFFECTED: ${{ parameters.include_affected }}
      OX_CHECK_INCLUDE_REQUIRED: ${{ parameters.include_required }}
