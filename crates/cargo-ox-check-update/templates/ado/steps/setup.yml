#
# Parameters:
#   group: which ox-check group to install setup for. Special values:
#     - "" (default): install the full catalog via
#       `just ox-check-setup` -- use for "give me everything" flows.
#     - "none": skip tool installation entirely; just bootstrap the
#       rust cache + libclang + just. Used by impact.yml, which installs
#       only cargo-delta afterwards.
#     - anything else (e.g. "pr-fast"): install only that group's
#       prerequisites via `just ox-check-<group>-setup`.
parameters:
  - name: group
    type: string
    default: ''
steps:
  - bash: echo "##vso[task.setvariable variable=ox_check_rustc_version]$(rustc --version | awk '{print $2}')"
    displayName: ox-check setup (capture rustc version)
  - task: Cache@2
    inputs:
      # Same key shape as the GitHub side: OS + arch + rustc version +
      # lockfile hashes + catalog hash. Including arch keeps any
      # future ARM pool an adopter adds from colliding with x86_64 on
      # the same OS namespace.
      key: 'ox-check-v1 | "$(Agent.OS)" | "$(Agent.OSArchitecture)" | rust$(ox_check_rustc_version) | Cargo.lock | .cargo/config.toml | rust-toolchain.toml | justfiles/ox-check/versions.just'
      restoreKeys: |
        ox-check-v1 | "$(Agent.OS)" | "$(Agent.OSArchitecture)" | rust$(ox_check_rustc_version)
        ox-check-v1 | "$(Agent.OS)" | "$(Agent.OSArchitecture)"
      path: |
        $(HOME)/.cargo/registry/cache/
        $(HOME)/.cargo/registry/index/
        $(HOME)/.cargo/bin/
        target/
    displayName: ox-check setup (cache cargo home and target)

  # System dependencies for catalog source builds. See the GitHub
  # composite setup-action.yml for the rationale — same pattern.
  # Detect the distro's package manager so this works on Ubuntu agents
  # (apt-get) and Azure Linux 3 agents (tdnf, common on 1ESPT) alike.
  - bash: |
      set -euo pipefail
      if command -v tdnf >/dev/null 2>&1; then
        sudo tdnf install -y clang-devel
      elif command -v dnf >/dev/null 2>&1; then
        sudo dnf install -y clang-devel
      elif command -v apt-get >/dev/null 2>&1; then
        sudo apt-get update && sudo apt-get install -y libclang-dev
      else
        echo "No supported package manager found (tdnf/dnf/apt-get)" >&2
        exit 1
      fi
    condition: eq(variables['Agent.OS'], 'Linux')
    displayName: ox-check setup (install libclang on Linux)

  - bash: |
      if ! command -v just >/dev/null 2>&1 ; then
        cargo install --locked just
      fi
    displayName: ox-check setup (install just)

  # Hand everything else off to the catalog recipe. Idempotent. ADO
  # uses the default `install` backend (source builds) because
  # cargo-binstall has unresolved compliance issues for internal ADO
  # pipelines (GH uses `binstall`).
  #
  # Selection mirrors setup-action.yml (GH composite):
  #   group=""     -> full catalog (ox-check-setup)
  #   group="none" -> skip; caller installs what it needs
  #   group=<x>    -> only that group's prerequisites
  - ${{ if eq(parameters.group, 'none') }}:
      - bash: echo "ox-check-setup: group=none, skipping tool install"
        displayName: ox-check setup (group=none -- skip tool install)
  - ${{ elseif eq(parameters.group, '') }}:
      - bash: just ox-check-setup
        displayName: ox-check setup (install full catalog)
  - ${{ else }}:
      - bash: just ox-check-${{ parameters.group }}-setup
        displayName: ox-check setup (install ${{ parameters.group }} prerequisites)

