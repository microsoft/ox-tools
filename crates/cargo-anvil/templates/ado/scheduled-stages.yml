#
# Every job is rendered through `steps/job.yml` (user-customizable wrapper);
# see pr-stages.yml for the rationale and template-path note.
parameters:
  - name: linuxPool
    type: object
    default: { vmImage: ubuntu-latest }
  - name: windowsPool
    type: object
    default: { vmImage: windows-latest }

stages:
  - stage: scheduled_test
    displayName: anvil scheduled-test
    # Full-workspace tier: ANVIL_IMPACT=off makes each check's anvil-impact
    # dependency no-op and resolve to --workspace, so the scheduled tier
    # never scopes (and needs neither cargo-delta nor an impact artifact).
    variables:
      ANVIL_IMPACT: "off"
    jobs:
      # Publish coverage from both legs so OS-gated code is fully
      # represented (see the pr-stages.yml comment for the rationale).
      - template: steps/job.yml
        parameters:
          name: linux
          pool: ${{ parameters.linuxPool }}
          steps:
            - template: steps/scheduled-test.yml
            - task: PublishCodeCoverageResults@2
              condition: succeededOrFailed()
              displayName: Publish coverage (linux)
              inputs:
                summaryFileLocation: target/coverage/cobertura-*.xml
                failIfCoverageEmpty: false
      - template: steps/job.yml
        parameters:
          name: windows
          pool: ${{ parameters.windowsPool }}
          steps:
            - template: steps/scheduled-test.yml
            - task: PublishCodeCoverageResults@2
              condition: succeededOrFailed()
              displayName: Publish coverage (windows)
              inputs:
                summaryFileLocation: target/coverage/cobertura-*.xml
                failIfCoverageEmpty: false

  - stage: scheduled_advisories
    displayName: anvil scheduled-advisories
    dependsOn: []
    variables:
      ANVIL_IMPACT: "off"
    jobs:
      # Cross-OS because clippy and udeps in this group compile per host,
      # so cfg-gated code must be linted/scanned on both OSes.
      - template: steps/job.yml
        parameters:
          name: linux
          pool: ${{ parameters.linuxPool }}
          steps:
            - template: steps/scheduled-advisories.yml
      - template: steps/job.yml
        parameters:
          name: windows
          pool: ${{ parameters.windowsPool }}
          steps:
            - template: steps/scheduled-advisories.yml

  - stage: scheduled_runtime_analysis
    displayName: anvil scheduled-runtime-analysis
    dependsOn: []
    variables:
      ANVIL_IMPACT: "off"
    jobs:
      # OS scope mirrors pr-runtime-analysis: any OS already considered
      # "worth running miri on" gets the stricter profiles too. ADO
      # hosted pools don't ship hosted ARM runners; adopters with self-
      # hosted ARM agents override the matrix in their root pipeline.
      - template: steps/job.yml
        parameters:
          name: linux
          pool: ${{ parameters.linuxPool }}
          steps:
            - template: steps/scheduled-runtime-analysis.yml
      - template: steps/job.yml
        parameters:
          name: windows
          pool: ${{ parameters.windowsPool }}
          steps:
            - template: steps/scheduled-runtime-analysis.yml

  - stage: scheduled_exhaustive
    displayName: anvil scheduled-exhaustive
    dependsOn: []
    variables:
      ANVIL_IMPACT: "off"
    jobs:
      # Cross-OS to match oxidizer's policy: full-workspace mutation
      # testing + cargo-hack powerset + bench compile checks all benefit
      # from running on both OSes for cfg(target_os) coverage. Adopters
      # who can't afford the Windows leg override the matrix in their
      # root pipeline.
      - template: steps/job.yml
        parameters:
          name: linux
          pool: ${{ parameters.linuxPool }}
          steps:
            - template: steps/scheduled-exhaustive.yml
      - template: steps/job.yml
        parameters:
          name: windows
          pool: ${{ parameters.windowsPool }}
          steps:
            - template: steps/scheduled-exhaustive.yml
