# Owned by cargo-anvil; edit via `cargo anvil`.
trigger: none
pr: none

schedules:
  - cron: "0 6 * * *"
    displayName: anvil scheduled
    branches:
      include: [main, master]
    always: true

stages:
  - template: anvil/scheduled.yml
    parameters:
      linuxPool: { vmImage: ubuntu-latest }
      windowsPool: { vmImage: windows-latest }
  # Repo-owned extension point: add your own scheduled-tier stages in
  # anvil/custom-scheduled-stages.yml (emitted as an empty stub) without
  # editing this anvil-owned root pipeline.
  - template: anvil/custom-scheduled-stages.yml
    parameters:
      linuxPool: { vmImage: ubuntu-latest }
      windowsPool: { vmImage: windows-latest }
