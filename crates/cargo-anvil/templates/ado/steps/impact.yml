# Owned by cargo-anvil; edit via `cargo anvil`.
# Runs the `anvil-impact` just recipe, which computes the cargo-delta
# impact set and writes the durable artifacts to target/anvil/impact/
# (snapshots, impact.json, and the per-tier include_*.txt cache files).
#
# This step only *produces* the artifacts. The enclosing job (pr-stages.yml)
# publishes target/anvil/impact/ as a pipeline artifact via job.yml's
# `artifacts` parameter, so downstream group stages can restore it. The
# formatting/projection logic lives entirely in the recipe (one source of
# truth), shared by local and cloud-workflow runs.
steps:
  # Reuse the per-job setup (toolchain, cargo cache, just install) so
  # cargo + just are on PATH and ~/.cargo/bin is restored from cache.
  # group=none skips the full catalog install -- impact only needs
  # cargo-delta, which we install on the next step.
  - template: setup.yml
    parameters:
      group: none
  - bash: just anvil-tool-cargo-delta-install install
    displayName: anvil impact (install cargo-delta)
  - bash: just anvil-impact
    displayName: anvil impact (cargo-delta)
    # The recipe resolves the base ref from BASE_REF (adopters may set it,
    # e.g. `origin/release`) or SYSTEM_PULLREQUEST_TARGETBRANCH on PR
    # build-validation runs, normalizing refs/heads/<name> to origin/<name>.
    # It snapshots the base ref in a throwaway worktree, so the job needs
    # full history (ADO's default checkout fetches it).
