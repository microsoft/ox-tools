# Managed by cargo-anvil. Update the corresponding template in the cargo-anvil
# crate unless the change is repository-specific.
# Update behaviour: https://github.com/microsoft/ox-tools/blob/main/crates/cargo-anvil/docs/design/updates.md
# Runs the shared `anvil-impact` recipe and leaves its cache under
# target/anvil/impact/. The compute job (pr-stages.yml) publishes that
# directory as the `anvil-impact-<os>` pipeline artifact (via job.yml's
# `artifacts:` param), which each downstream group stage downloads and its
# scoped checks read directly -- the same code path as a local run. No stage
# output variables / env threading are involved.
steps:
  # Reuse the per-job setup (toolchain, cargo cache, just install) so
  # cargo + just are on PATH and ~/.cargo/bin is restored from cache.
  # group=none skips the full catalog install -- impact only needs
  # cargo-delta, which we install on the next step.
  - template: setup.yml
    parameters:
      group: none
  - bash: just anvil-tool-cargo-delta-install install
    displayName: anvil impact (install cargo-delta)
  - bash: just anvil-impact
    # Run the shared anvil-impact recipe -- the SAME impact building block
    # adopters run locally. It resolves the base ref (_anvil-base-ref),
    # snapshots the base merge target in a throwaway worktree + the current
    # tree, runs `cargo delta impact`, and writes the cache under
    # target/anvil/impact/. This is the only job that needs cargo-delta; the
    # group stages just download the artifact it produces.
    displayName: anvil impact (cargo-delta)
