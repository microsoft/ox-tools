# Owned by cargo-anvil; edit via `cargo anvil`.
# Computes per-tier include lists from cargo-delta and publishes them
# as stage outputs for downstream group stages to consume.
#
# Output variables (consumed in pr-stages.yml via
# stageDependencies.impact.compute.outputs['compute.<name>']):
#   include_modified - "--package X@ver --package Y@ver" or "--skip"
#                      sentinel. Packages are version-qualified cargo
#                      specs so they resolve uniquely even when a like-
#                      named crate is also a transitive dependency.
#   include_affected - same shape, for the affected set (modified ∪ rev-deps).
#   include_required - same shape, for the required set
#                      (affected ∪ workspace-internal transitive deps).
#
# Unscoped recipes (deny, audit, aprz, pr-title) ignore all three.
steps:
  # Reuse the per-job setup (toolchain, cargo cache, just install) so
  # cargo + just are on PATH and ~/.cargo/bin is restored from cache.
  # group=none skips the full catalog install -- impact only needs
  # cargo-delta, which we install on the next step.
  - template: setup.yml
    parameters:
      group: none
  - bash: just anvil-tool-cargo-delta-install install
    displayName: anvil impact (install cargo-delta)
  - bash: |
      set -euo pipefail
      # Resolve the baseline ref via the shared anvil resolver (single
      # source of truth; see the _anvil-base-ref recipe). On ADO PRs it
      # strips refs/heads/ from SYSTEM_PULLREQUEST_TARGETBRANCH and resolves
      # to origin/<branch>; BASE_REF overrides; non-PR runs fall back to
      # origin/main then origin/master.
      base="$(just _anvil-base-ref)"
      # The baseline worktree is checked out at the merge target, whose
      # rust-toolchain.toml may pin a toolchain that is NOT installed on the
      # agent (any PR that bumps rust-toolchain.toml hits this -- the agent
      # only has the PR's pinned toolchain). The snapshot is metadata-only
      # (file presence + content hashes), so run the baseline under the
      # agent's *active* toolchain via RUSTUP_TOOLCHAIN, which overrides the
      # worktree's rust-toolchain.toml. Capture it here, in the PR checkout,
      # where the active toolchain is resolved and installed.
      active_toolchain="$(rustup show active-toolchain | head -n1 | cut -d' ' -f1)"
      # Two snapshots + impact compare (cargo-delta has no --base
      # shortcut). The baseline runs in a worktree at the merge target
      # so the checked-out tree is untouched.
      #
      # GIT_LFS_SKIP_SMUDGE=1 prevents the worktree checkout from trying
      # to fetch LFS objects -- the worktree inherits the parent repo's
      # git config but NOT the credential helper that authenticated the
      # initial checkout, so any LFS-tracked file would otherwise fail
      # with "Git credentials ... not found". cargo-delta only needs
      # file presence + content hashes; LFS pointer files hash
      # consistently across baseline and current, so the impact analysis
      # is unaffected.
      cargo delta snapshot > "$AGENT_TEMPDIRECTORY/anvil-current.json"
      GIT_LFS_SKIP_SMUDGE=1 git worktree add --detach "$AGENT_TEMPDIRECTORY/anvil-baseline" "$base"
      # When anvil is first introduced (this PR adds the cargo workspace),
      # the baseline branch has no root Cargo.toml, so there is no workspace
      # for cargo-delta to snapshot. Detect that explicitly and fall back to
      # full-workspace validation (empty include_* -> recipes default to
      # --workspace) rather than running cargo-delta. This is a targeted
      # check: any *other* cargo-delta failure below is a real error and is
      # allowed to fail the impact stage (and thus the gated pr-* stages).
      if [ ! -f "$AGENT_TEMPDIRECTORY/anvil-baseline/Cargo.toml" ] ; then
          echo "anvil impact: baseline '$base' has no root Cargo.toml (not a cargo workspace yet -- first-time anvil adoption?). Falling back to full-workspace validation." >&2
          git worktree remove --force "$AGENT_TEMPDIRECTORY/anvil-baseline"
          echo "##vso[task.setvariable variable=include_modified;isOutput=true]"
          echo "##vso[task.setvariable variable=include_affected;isOutput=true]"
          echo "##vso[task.setvariable variable=include_required;isOutput=true]"
          exit 0
      fi
      ( cd "$AGENT_TEMPDIRECTORY/anvil-baseline" \
          && RUSTUP_TOOLCHAIN="$active_toolchain" cargo delta snapshot ) \
          > "$AGENT_TEMPDIRECTORY/anvil-baseline.json"
      git worktree remove --force "$AGENT_TEMPDIRECTORY/anvil-baseline"
      cargo delta impact \
          --baseline "$AGENT_TEMPDIRECTORY/anvil-baseline.json" \
          --current  "$AGENT_TEMPDIRECTORY/anvil-current.json" \
          --format json \
          > "$AGENT_TEMPDIRECTORY/anvil-impact.json"
      # Format each tier into the `--package name@version ...` shape the
      # checks.just recipes consume (or the "--skip" sentinel when a tier
      # is empty), via the shared _anvil-impact-format recipe -- single
      # source of truth across the GitHub and ADO impact steps. See that
      # recipe in checks.just for the version-qualification and lib-name
      # translation rationale.
      for tier in modified affected required; do
          val="$(just _anvil-impact-format "$tier" "$AGENT_TEMPDIRECTORY/anvil-impact.json")"
          echo "##vso[task.setvariable variable=include_${tier};isOutput=true]$val"
      done
    name: compute
    displayName: anvil impact (cargo-delta)
