# Owned by cargo-anvil; edit via `cargo anvil`.
# Computes per-tier include lists from cargo-delta and publishes them
# as stage outputs for downstream group stages to consume.
#
# Output variables (consumed in pr-stages.yml via
# stageDependencies.impact.compute.outputs['compute.<name>']):
#   include_modified - "--package X --package Y" or "--skip" sentinel.
#   include_affected - same shape, for the affected set (modified ∪ rev-deps).
#   include_required - same shape, for the required set
#                      (affected ∪ workspace-internal transitive deps).
#
# Unscoped recipes (deny, audit, aprz, pr-title) ignore all three.
steps:
  # Reuse the per-job setup (toolchain, cargo cache, just install) so
  # cargo + just are on PATH and ~/.cargo/bin is restored from cache.
  # group=none skips the full catalog install -- impact only needs
  # cargo-delta, which we install on the next step.
  - template: setup.yml
    parameters:
      group: none
  - bash: just anvil-tool-cargo-delta-install install
    displayName: anvil impact (install cargo-delta)
  - bash: |
      set -euo pipefail
      # Determine the baseline ref:
      #   * Adopters can override via BASE_REF (full ref name, e.g.
      #     `origin/release`).
      #   * On PR build-validation runs, SYSTEM_PULLREQUEST_TARGETBRANCH
      #     is set to the unqualified target branch (e.g. `main`).
      #   * Otherwise fall back to `master` so manual / branch CI runs
      #     produce a sensible diff against the default branch.
      # The ADO macro form `$(System.PullRequest.TargetBranch)` is unsafe
      # here: when the variable is unset (non-PR builds), ADO leaves the
      # `$(...)` literal in the script, which bash then interprets as
      # command substitution and fails with exit 127.
      base="${BASE_REF:-origin/${SYSTEM_PULLREQUEST_TARGETBRANCH:-master}}"
      # Two snapshots + impact compare (cargo-delta has no --base
      # shortcut). The baseline runs in a worktree at the merge target
      # so the checked-out tree is untouched.
      #
      # GIT_LFS_SKIP_SMUDGE=1 prevents the worktree checkout from trying
      # to fetch LFS objects -- the worktree inherits the parent repo's
      # git config but NOT the credential helper that authenticated the
      # initial checkout, so any LFS-tracked file would otherwise fail
      # with "Git credentials ... not found". cargo-delta only needs
      # file presence + content hashes; LFS pointer files hash
      # consistently across baseline and current, so the impact analysis
      # is unaffected.
      cargo delta snapshot > "$AGENT_TEMPDIRECTORY/anvil-current.json"
      GIT_LFS_SKIP_SMUDGE=1 git worktree add --detach "$AGENT_TEMPDIRECTORY/anvil-baseline" "$base"
      ( cd "$AGENT_TEMPDIRECTORY/anvil-baseline" && cargo delta snapshot ) \
          > "$AGENT_TEMPDIRECTORY/anvil-baseline.json"
      git worktree remove --force "$AGENT_TEMPDIRECTORY/anvil-baseline"
      result="$(cargo delta impact \
          --baseline "$AGENT_TEMPDIRECTORY/anvil-baseline.json" \
          --current  "$AGENT_TEMPDIRECTORY/anvil-current.json" \
          --format json)"
      # cargo-delta emits TitleCase keys (Modified / Affected /
      # Required). Format each tier into the --package args shape
      # recipes expect, with --skip as the empty-set sentinel.
      #
      # cargo-delta's impact output uses *library names* (snake_case)
      # rather than cargo *package names* (which may use hyphens). For
      # hyphenated packages — e.g. `cargo-anvil` — that means it
      # emits `cargo_anvil`, which cargo rejects as a --package
      # specification. We build:
      #   * `pkg_map`: lib-name -> package-name (and identity for
      #     package-name -> package-name), for translation;
      #   * `valid_pkgs`: set of all known package names, for
      #     validation. Names cargo-delta emits that aren't valid
      #     packages (e.g. directory-leaf ambiguities like `ffi` /
      #     `ffi_build` in deeply nested workspaces) are dropped with a
      #     warning rather than failing the whole build.
      declare -A pkg_map
      declare -A valid_pkgs
      while IFS=$'\t' read -r pkg_name lib_name; do
          valid_pkgs["$pkg_name"]=1
          pkg_map["$pkg_name"]="$pkg_name"
          [ -n "$lib_name" ] && pkg_map["$lib_name"]="$pkg_name"
      done < <(cargo metadata --no-deps --format-version 1 \
          | jq -r '.packages[] as $p | ($p.targets[] | select(.kind | index("lib")) | "\($p.name)\t\(.name)"), "\($p.name)\t"')
      format_set() {
          local field="$1"
          local pkgs
          pkgs=$(printf '%s' "$result" | jq -r --arg f "$field" '(.[$f] // []) | .[]' 2>/dev/null || true)
          if [ -z "$pkgs" ] ; then
              printf '%s' "--skip"
          else
              local out=""
              while IFS= read -r pkg ; do
                  [ -z "$pkg" ] && continue
                  local mapped="${pkg_map[$pkg]:-$pkg}"
                  if [ -z "${valid_pkgs[$mapped]:-}" ] ; then
                      echo "anvil impact: dropping unknown package '$pkg' (-> '$mapped') from $field set; see https://github.com/microsoft/ox-tools/issues for tracking" >&2
                      continue
                  fi
                  out="$out --package $mapped"
              done <<EOF
      $pkgs
      EOF
              if [ -z "$out" ] ; then
                  printf '%s' "--skip"
              else
                  printf '%s' "${out# }"
              fi
          fi
      }
      include_modified="$(format_set Modified)"
      include_affected="$(format_set Affected)"
      include_required="$(format_set Required)"
      echo "##vso[task.setvariable variable=include_modified;isOutput=true]$include_modified"
      echo "##vso[task.setvariable variable=include_affected;isOutput=true]$include_affected"
      echo "##vso[task.setvariable variable=include_required;isOutput=true]$include_required"
    name: compute
    displayName: anvil impact (cargo-delta)
