# Owned by cargo-anvil; edit via `cargo anvil`.
# The token __GROUP__ is substituted by cargo-anvil at emit time with
# the concrete check-group name (pr-fast, pr-test, scheduled-runtime-analysis, ...).
name: anvil-__GROUP__
description: Run the __GROUP__ check group.
inputs:
  impact_artifact:
    description: |
      Name of the `anvil-impact` pipeline artifact to restore into
      target/anvil/impact/ before running the group. The group's checks
      depend on `anvil-impact`, which finds the restored cache fresh and
      no-ops (a cache hit) rather than recomputing. Leave empty to skip
      the download; the checks then recompute the impact set in place
      (cargo-delta is part of every PR-tier group's setup so the
      recompute fallback works).
    default: ""
    required: false
runs:
  using: composite
  steps:
    # Restore the shared impact artifact when one was produced by an
    # upstream impact job. The download is best-effort: if the artifact
    # is absent the group's checks recompute the impact set themselves.
    - name: Download anvil-impact artifact
      if: inputs.impact_artifact != ''
      uses: actions/download-artifact@v4
      with:
        name: ${{ inputs.impact_artifact }}
        path: target/anvil/impact
    - uses: ./.github/actions/anvil-setup
      with:
        group: __GROUP__
    - name: Run just anvil-__GROUP__
      shell: bash
      env:
        # cargo-aprz hits the GitHub API (unauthenticated = 60 req/hr); pass the
        # built-in token so it can use the 1000 req/hr authenticated quota.
        GITHUB_TOKEN: ${{ github.token }}
      run: just anvil-__GROUP__
