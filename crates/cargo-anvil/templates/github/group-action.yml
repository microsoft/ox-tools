# Managed by cargo-anvil. Update the corresponding template in the cargo-anvil
# crate unless the change is repository-specific.
# Update behaviour: https://github.com/microsoft/ox-tools/blob/main/crates/cargo-anvil/docs/design/updates.md
# The token __GROUP__ is substituted by cargo-anvil at emit time with
# the concrete check-group name (pr-fast, pr-test, scheduled-runtime-analysis, ...).
name: anvil-__GROUP__
description: Run the __GROUP__ check group.
# No impact inputs: a PR group job downloads the `anvil-impact-<runner.os>`
# artifact into target/anvil/impact/ BEFORE this action runs, and the scoped
# checks read that cache directly (exactly like a local run) via their
# `anvil-impact` dependency -- no include lists are threaded through inputs or
# environment variables. Scheduled group jobs download nothing and run
# full-workspace (see the run step).
inputs:
  free-disk-space:
    description: Remove unused toolchains from GitHub-hosted runners before setup.
    default: "false"
    required: false
runs:
  using: composite
  steps:
    - uses: ./.github/actions/anvil-setup
      with:
        group: __GROUP__
        free-disk-space: ${{ inputs.free-disk-space }}
    - name: Run just anvil-__GROUP__
      shell: bash
      env:
        # Some checks (e.g. cargo-aprz, run only by groups that include it)
        # hit the GitHub API; pass the built-in token so they use the
        # authenticated quota (1000 vs 60 req/hr). Harmless for groups whose
        # checks never read it.
        GITHUB_TOKEN: ${{ github.token }}
      run: |
        set -euo pipefail
        # If no impact cache is present (no artifact was downloaded -- e.g. the
        # scheduled tier, which runs full-workspace), disable scoping so the
        # `anvil-impact` dependency of each check no-ops without needing
        # cargo-delta and every tier defaults to --workspace. When a PR group
        # job HAS downloaded the target/anvil/impact artifact, the cache is
        # present and the checks read it -- the same code path as a local run.
        if [ ! -f target/anvil/impact/impact.state ]; then
          export ANVIL_IMPACT=off
        fi
        just anvil-__GROUP__
