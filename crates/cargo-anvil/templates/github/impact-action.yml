# Owned by cargo-anvil; edit via `cargo anvil`.
name: anvil-impact
description: |
  Compute the cargo-delta impact set for this PR by running the
  `anvil-impact` just recipe, which writes the durable impact artifacts
  to `target/anvil/impact/` (snapshots, impact.json, and the per-tier
  include_*.txt cache files).

  This action only *produces* the artifacts. The calling workflow job is
  responsible for uploading `target/anvil/impact/` as a pipeline artifact
  (with an OS-specific name) so downstream group jobs can restore it. The
  formatting/projection logic lives entirely in the recipe (one source of
  truth), shared by local and cloud-workflow runs.
runs:
  using: composite
  steps:
    # anvil-setup with group=none bootstraps the rust toolchain + just +
    # binstall + cache, but skips the full catalog install. The
    # anvil-impact recipe installs/validates cargo-delta itself, so this
    # keeps the impact stage lean -- it's the critical-path gating dep
    # for every PR-tier group job.
    - uses: ./.github/actions/anvil-setup
      with:
        group: none
    - name: Install cargo-delta
      shell: bash
      run: just anvil-tool-cargo-delta-install binstall
    - name: Compute impact
      shell: bash
      # GITHUB_BASE_REF is the target-branch name on a PR event (e.g.
      # "main"); the recipe normalizes it to origin/<name>. Adopters can
      # override via the BASE_REF env var. The recipe needs full history
      # (the calling job checks out with fetch-depth: 0) to snapshot the
      # base ref in a throwaway worktree.
      run: just anvil-impact
